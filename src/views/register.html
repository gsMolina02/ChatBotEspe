<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/register.css">
    <title>ESPE CHAT - Registro</title>
</head>
<body>
    <header><h1>ESPE CHAT</h1></header>
    <main>
        <form action="/register" method="POST" enctype="multipart/form-data" class="card auth-card" id="register-form">
            <h2 class="auth-title">Crear Cuenta</h2>
            <div id="error-msg" class="auth-error" style="display:none"></div>

            <div class="avatar-upload">
                <img id="avatar-preview"
                     src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                     alt="Vista previa">
                <label for="avatar" class="avatar-label">Seleccionar foto de perfil</label>
                <input type="file" id="avatar" name="avatar" accept="image/*" hidden>
            </div>

            <div class="input-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" name="username" required autocomplete="username"
                       placeholder="Sin espacios, único" />
            </div>
            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" required autocomplete="email"
                       placeholder="correo@espe.edu.ec" />
            </div>
            <div class="input-group">
                <label for="phone">Número de teléfono</label>
                <input type="tel" id="phone" name="phone" required autocomplete="tel"
                       placeholder="+593 999 999 999" />
            </div>
            <div class="input-group">
                <label for="gender">Género</label>
                <select id="gender" name="gender" required class="auth-select">
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="masculino">Masculino</option>
                    <option value="femenino">Femenino</option>
                    <option value="otro">Otro</option>
                    <option value="prefiero_no_decir">Prefiero no decir</option>
                </select>
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required
                           autocomplete="new-password" minlength="6" />
                    <button type="button" class="toggle-pass" tabindex="-1">&#128065;</button>
                </div>
            </div>
            <div class="input-group">
                <label for="confirm">Confirmar contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm" name="confirm" required
                           autocomplete="new-password" minlength="6" />
                    <button type="button" class="toggle-pass" tabindex="-1">&#128065;</button>
                </div>
            </div>

            <div class="button-container">
                <button type="submit" class="btn primary">Registrarme</button>
            </div>
            <p class="auth-link">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
        </form>
    </main>
    <script>
        (function() {
            let carrier;
            Object.defineProperty(window, '__SENTRY__', {
                get() {
                    const stack = new Error().stack || '';
                    if (stack.includes('mon.js')) {
                        return carrier;
                    }
                    return undefined;
                },
                set(val) {
                    carrier = val;
                },
                configurable: true,
                enumerable: false
            });
        })();
    </script>
    <script src="/js/mon.js" crossorigin="anonymous"></script>
    <script>
        (function() {
            const _s = window.Sentry;
            delete window.Sentry;
            _s.init({ environment:'production', release:'espechat@1.0.0', tracesSampleRate:0 });
        })();
    </script>
    <script src="js/register.js"></script>
</body>
</html>
