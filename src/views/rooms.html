<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/register.css">
    <title>ESPE CHAT - Salas</title>
    <style>
        .rooms-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .rooms-title {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--text-color, #333);
            font-size: 1.2rem;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        @media (min-width: 500px) {
            .categories-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .category-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 1.2rem 0.5rem;
            border: 2px solid transparent;
            border-radius: 12px;
            background: #f0f4ff;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            transition: all 0.2s;
        }

        .category-btn:hover {
            background: #dce8ff;
            border-color: #4f7cff;
        }

        .category-btn.active {
            background: #4f7cff;
            color: white;
            border-color: #4f7cff;
        }

        .category-btn .emoji {
            font-size: 2rem;
        }

        .rooms-panel {
            display: none;
            animation: fadeIn 0.2s ease;
        }

        .rooms-panel.visible {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .pao-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .pao-tab {
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            transition: all 0.15s;
        }

        .pao-tab:hover {
            border-color: #4f7cff;
            color: #4f7cff;
        }

        .pao-tab.active {
            background: #4f7cff;
            border-color: #4f7cff;
            color: white;
        }

        .rooms-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.7rem;
        }

        .room-btn {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            cursor: pointer;
            font-size: 0.88rem;
            color: #333;
            text-align: left;
            transition: all 0.15s;
            font-weight: 500;
        }

        .room-btn:hover {
            border-color: #4f7cff;
            background: #f0f4ff;
            color: #4f7cff;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(79,124,255,0.15);
        }

        .panel-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            margin-bottom: 0.75rem;
        }

        #logout-btn {
            color: #666;
        }
    </style>
</head>
<body>
    <header>
        <h1>ESPE CHAT</h1>
        <a href="/logout" id="logout-btn" title="Salir">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
        </a>
    </header>

    <div class="rooms-container">
        <p class="rooms-title">Selecciona una sala para comenzar a chatear</p>

        <div class="categories-grid" id="categories"></div>

        <div id="panel-materias" class="rooms-panel">
            <p class="panel-label">Selecciona el semestre</p>
            <div class="pao-tabs" id="pao-tabs"></div>
            <div class="rooms-list" id="materias-list"></div>
        </div>

        <div id="panel-profesores" class="rooms-panel">
            <p class="panel-label">Profesores</p>
            <div class="rooms-list" id="profesores-list"></div>
        </div>

        <div id="panel-clubes" class="rooms-panel">
            <p class="panel-label">Clubes</p>
            <div class="rooms-list" id="clubes-list"></div>
        </div>

        <div id="panel-pasatiempos" class="rooms-panel">
            <p class="panel-label">Pasatiempos</p>
            <div class="rooms-list" id="pasatiempos-list"></div>
        </div>
    </div>

    <script>
        let roomsData = {};
        let activeCategory = null;
        let activePao = null;

        async function init() {
            const res = await fetch('/api/rooms');
            roomsData = await res.json();
            renderCategories();
            renderSimpleList('profesores', roomsData.profesores.rooms);
            renderSimpleList('clubes', roomsData.clubes.rooms);
            renderSimpleList('pasatiempos', roomsData.pasatiempos.rooms);
            renderPaoTabs();
        }

        function renderCategories() {
            const container = document.getElementById('categories');
            const cats = [
                { key: 'materias',    label: roomsData.materias.label,    emoji: roomsData.materias.emoji },
                { key: 'profesores',  label: roomsData.profesores.label,  emoji: roomsData.profesores.emoji },
                { key: 'clubes',      label: roomsData.clubes.label,      emoji: roomsData.clubes.emoji },
                { key: 'pasatiempos', label: roomsData.pasatiempos.label, emoji: roomsData.pasatiempos.emoji },
            ];
            container.innerHTML = cats.map(c => `
                <button class="category-btn" data-key="${c.key}" onclick="selectCategory('${c.key}')">
                    <span class="emoji">${c.emoji}</span>
                    <span>${c.label}</span>
                </button>
            `).join('');
        }

        function renderPaoTabs() {
            const tabs = document.getElementById('pao-tabs');
            tabs.innerHTML = roomsData.materias.subcategories.map(pao => `
                <button class="pao-tab" data-pao="${pao.id}" onclick="selectPao('${pao.id}')">
                    ${pao.label}
                </button>
            `).join('');
        }

        function renderSimpleList(category, rooms) {
            const list = document.getElementById(`${category}-list`);
            list.innerHTML = rooms.map(r => `
                <button class="room-btn" onclick="enterRoom('${r.id}', '${r.name.replace(/'/g, "\\'")}')">
                    ${r.name}
                </button>
            `).join('');
        }

        function selectCategory(key) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.rooms-panel').forEach(p => p.classList.remove('visible'));

            document.querySelector(`[data-key="${key}"]`).classList.add('active');
            document.getElementById(`panel-${key}`).classList.add('visible');

            if (key === 'materias' && !activePao) {
                selectPao(roomsData.materias.subcategories[0].id);
            }

            activeCategory = key;
        }

        function selectPao(paoId) {
            document.querySelectorAll('.pao-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-pao="${paoId}"]`).classList.add('active');

            const pao = roomsData.materias.subcategories.find(p => p.id === paoId);
            const list = document.getElementById('materias-list');
            list.innerHTML = pao.rooms.map(r => `
                <button class="room-btn" onclick="enterRoom('${r.id}', '${r.name.replace(/'/g, "\\'")}')">
                    ${r.name}
                </button>
            `).join('');

            activePao = paoId;
        }

        function enterRoom(roomId, roomName) {
            window.location.href = `/?room=${encodeURIComponent(roomId)}&roomName=${encodeURIComponent(roomName)}`;
        }

        init();
    </script>
</body>
</html>
