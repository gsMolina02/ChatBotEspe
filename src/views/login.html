<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/register.css">
    <title>ESPE CHAT - Iniciar Sesión</title>
</head>
<body>
    <header><h1>ESPE CHAT</h1></header>
    <main>
        <form action="/login" method="POST" class="card auth-card" id="login-form">
            <h2 class="auth-title">Iniciar Sesión</h2>
            <div id="error-msg" class="auth-error" style="display:none"></div>
            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" required autocomplete="email" />
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required autocomplete="current-password" />
                    <button type="button" class="toggle-pass" tabindex="-1">&#128065;</button>
                </div>
            </div>
            <div class="button-container">
                <button type="submit" class="btn primary">Entrar al chat</button>
            </div>
            <p class="auth-link">¿No tienes cuenta? <a href="/register">Regístrate</a></p>
        </form>
    </main>
    <script>
        window.sentryOnload = function(){
            Sentry.init({ environment:'production', release:'espechat@1.0.0', tracesSampleRate:0 });
        };
    </script>
    <script src="https://js.sentry-cdn.com/a2a246199325900c8ee1065ccd0f5714.min.js" crossorigin="anonymous"></script>
    <script src="js/login.js"></script>
</body>
</html>
