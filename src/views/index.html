<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/register.css">    
    <link rel="stylesheet" href="css/chat.css">    
    <title>ESPE CHAT</title>
</head>
<body>
 <header>
    <a href="/rooms" id="back-btn" title="Cambiar sala">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
        </svg>
    </a>
    <div class="header-center">
        <h1>ESPE CHAT</h1>
        <span id="room-name" class="room-badge"></span>
    </div>
 </header>
 <div class="chat-container">
    <div id="all-messages" class="messages">
        <!-- Aquí se mostrarán los mensajes del chat -->
    </div>
<div id="typing-indicator" class="typing-indicator"></div>
<div class="input-group">
    <div id="emoji-picker-container" class="emoji-picker-container hidden">
        <emoji-picker></emoji-picker>
    </div>
    <div class="send-message">
        <button id="emoji-btn" type="button" title="Emojis">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                <line x1="9" y1="9" x2="9.01" y2="9"/>
                <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
        </button>
        <input type="text" placeholder="Escribe tu mensaje aquí..." id="message-input">
        <button id="send-message" class="btn btn-secondary">Enviar</button>
    </div>
</div>
<script>
    window.sentryOnload = function(){
        Sentry.init({
            environment: 'production',
            release: 'espechat@1.0.0',
            tracesSampleRate:0,
        });
    };
</script>
<script src="https://js.sentry-cdn.com/a2a246199325900c8ee1065ccd0f5714.min.js" crossorigin="anonymous"></script>
<script type="module" src="/emoji-picker-element/index.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="js/script.js"></script>
</body>
</html>
